name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-branch
  cancel-in-progress: false

jobs:
  publish-release-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Pack
        run: pnpm pack --pack-destination /tmp/release

      - name: Expand tarball into _release/
        run: |
          mkdir _release
          tar -xzf /tmp/release/*.tgz -C _release --strip-components=1

      - name: Sanitize package.json (strip lifecycle scripts and dev fields)
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('_release/package.json', 'utf8'));
            delete p.scripts;
            delete p.devDependencies;
            delete p.private;
            fs.writeFileSync('_release/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Force-push release branch
        run: |
          cd _release
          git init -b release
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "release: ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Smoke-test the just-published release
        run: |
          mkdir /tmp/consumer && cd /tmp/consumer
          cat > package.json <<JSON
          {
            "name": "consumer-smoke",
            "private": true,
            "type": "module",
            "devDependencies": {
              "@lslvm/vitest": "github:${GITHUB_REPOSITORY}#release",
              "vitest": "^4.1.5"
            }
          }
          JSON
          pnpm install --ignore-workspace --ignore-scripts
          f=node_modules/@lslvm/vitest/dist/index.js
          test -f "$f" || { echo "::error::missing $f — release branch did not ship dist"; exit 1; }
          test -f node_modules/@lslvm/vitest/dist/index.d.ts \
            || { echo "::error::missing dist/index.d.ts in release tree"; exit 1; }
          node --input-type=module -e "
            import('@lslvm/vitest').then(m => {
              if (typeof m.loadScript !== 'function') {
                console.error('loadScript not exported as function; got:', typeof m.loadScript);
                process.exit(1);
              }
              console.log('ok: exports =', Object.keys(m).sort().join(', '));
            }).catch(e => { console.error(e); process.exit(1); });
          "
